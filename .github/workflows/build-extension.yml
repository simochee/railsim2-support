name: Build Extension

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build language server
        run: pnpm --filter @lollipop-onl/railsim2-language-server build

      - name: Package extension
        run: pnpm --filter vscode-railsim2-grammar package

      - name: Upload VSIX
        uses: actions/upload-artifact@v4
        with:
          name: vscode-railsim2-grammar
          path: packages/vscode-extension/*.vsix
